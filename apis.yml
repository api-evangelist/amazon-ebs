name: Amazon EBS
description: Amazon Elastic Block Store (EBS) provides persistent block storage volumes for use with Amazon EC2 instances. EBS volumes are highly available and reliable storage volumes that can be 
  attached to any running instance in the same Availability Zone, offering consistent and low-latency performance for workloads that require persistent storage.
